<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Twinkle — Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#5B5BDB;--secondary:#8A8FE8;--accent:#C7C2F0;
  --surface:#F5F4FF;--surface-2:#EDE9FE;--white:#FFFFFF;
  --text-1:#1A1A2E;--text-2:#374151;--text-3:#6B7280;--text-4:#9CA3AF;
  --success:#22C55E;--error:#EF4444;--border:#E5E7EB;--bg:#F7F6FF;
  --shadow-sm:0 2px 16px rgba(91,91,219,0.07);
  --radius-lg:20px;--radius-full:100px;
  --gradient:linear-gradient(135deg,#5B5BDB 0%,#8A8FE8 100%);
  --nav-h:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow:hidden;}

.app{width:100%;max-width:480px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* ── HEADER ── */
.header{
  flex-shrink:0;background:var(--white);
  border-bottom:1px solid #F3F4F6;
  padding-top:env(safe-area-inset-top,0px);
  z-index:100;
}
.header-inner{height:60px;display:flex;align-items:center;padding:0 16px;}
.header-title{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:var(--text-1);flex:1;}
.icon-btn{width:40px;height:40px;border-radius:12px;background:none;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-1);transition:background 0.18s;}
.icon-btn:active{background:var(--surface-2);}
.icon-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── SEARCH BAR ── */
.search-wrap{
  padding:12px 16px;background:var(--white);
  border-bottom:1px solid #F3F4F6;flex-shrink:0;
}
.search-bar{
  height:44px;background:#F3F4F6;border-radius:var(--radius-full);
  display:flex;align-items:center;gap:10px;padding:0 16px;
}
.search-bar svg{width:17px;height:17px;stroke:var(--text-4);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.search-input{
  flex:1;background:none;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-1);
}
.search-input::placeholder{color:var(--text-4);}
.search-clear{background:none;border:none;cursor:pointer;padding:4px;display:none;color:var(--text-4);}
.search-clear.show{display:flex;align-items:center;}
.search-clear svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ── SCROLL AREA ── */
.chat-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));}
.chat-scroll::-webkit-scrollbar{display:none;}

/* ── SECTION LABEL ── */
.section-label{
  padding:14px 16px 6px;
  font-size:13px;font-weight:600;color:var(--text-3);
  letter-spacing:0.03em;
}

/* ── CHAT THREAD ITEM ── */
.thread-wrap{position:relative;overflow:hidden;}

/* Swipe delete panel (revealed on swipe left) */
.swipe-delete{
  position:absolute;right:0;top:0;bottom:0;
  width:80px;background:var(--error);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transform:translateX(80px);
  transition:transform 0.2s ease;
  border-radius:0 0 0 0;
}
.swipe-delete svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.thread-item{
  display:flex;align-items:center;
  padding:0 16px;height:76px;
  background:var(--white);
  cursor:pointer;
  transition:background 0.18s,transform 0.15s ease;
  position:relative;
  border-bottom:1px solid #F8F8FC;
  transform:translateX(0);
  user-select:none;
}
.thread-item:active{background:var(--surface);}
.thread-item.unread{background:#FDFCFF;}
.thread-item.deleting{animation:slideOut 0.3s ease forwards;}
@keyframes slideOut{to{transform:translateX(100%);opacity:0;height:0;padding:0;}}

/* Avatar */
.t-avatar{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--accent);
  background:var(--surface-2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:18px;font-weight:700;
  color:var(--primary);overflow:hidden;position:relative;
}
.t-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* Online dot */
.online-dot{
  position:absolute;bottom:1px;right:1px;
  width:13px;height:13px;border-radius:50%;
  background:var(--success);border:2.5px solid white;
}

/* Group avatar (stacked) */
.group-avatar{
  width:52px;height:52px;position:relative;flex-shrink:0;
}
.group-av-1,.group-av-2,.group-av-3{
  position:absolute;width:32px;height:32px;border-radius:50%;
  border:2px solid white;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:11px;font-weight:700;color:var(--primary);overflow:hidden;
}
.group-av-1 img,.group-av-2 img,.group-av-3 img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.group-av-1{top:0;left:0;z-index:3;}
.group-av-2{top:0;right:0;z-index:2;}
.group-av-3{bottom:0;left:10px;z-index:1;}

/* Thread content */
.t-content{flex:1;min-width:0;padding:0 12px;}
.t-name{
  font-family:'Sora',sans-serif;font-size:15px;font-weight:600;
  color:var(--text-1);margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.t-preview{
  font-size:13px;color:var(--text-3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.t-preview.bold{color:var(--text-1);font-weight:500;}

/* Typing indicator inline */
.typing-dots{display:inline-flex;align-items:center;gap:3px;}
.typing-dots span{
  width:5px;height:5px;border-radius:50%;
  background:var(--text-4);display:block;
  animation:typingBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.18s;}
.typing-dots span:nth-child(3){animation-delay:0.36s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}

/* Thread right side */
.t-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.t-time{font-size:11px;color:var(--text-4);}
.t-time.unread-time{color:var(--primary);font-weight:600;}
.unread-badge{
  min-width:20px;height:20px;padding:0 6px;
  border-radius:var(--radius-full);
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:white;
}

/* Long-press context menu */
.ctx-menu{
  position:fixed;z-index:600;
  background:var(--white);border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.16);
  overflow:hidden;min-width:180px;
  animation:ctxIn 0.18s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes ctxIn{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}
.ctx-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;cursor:pointer;
  font-size:15px;color:var(--text-1);font-weight:500;
  transition:background 0.15s;
}
.ctx-item:active{background:var(--surface);}
.ctx-item.danger{color:var(--error);}
.ctx-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.ctx-divider{height:1px;background:var(--border);}
.ctx-overlay{position:fixed;inset:0;z-index:599;}

/* ── NEW CHAT SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.42);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.28s;}
.sheet-overlay.show{opacity:1;pointer-events:all;}
.bottom-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--white);border-radius:28px 28px 0 0;z-index:501;transition:transform 0.38s cubic-bezier(0.34,1.08,0.64,1);padding-bottom:env(safe-area-inset-bottom,0px);max-height:80dvh;display:flex;flex-direction:column;}
.bottom-sheet.show{transform:translateX(-50%) translateY(0);}
.sheet-drag{width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:14px auto 0;flex-shrink:0;}
.sheet-hd{padding:16px 20px 10px;border-bottom:1px solid #F3F4F6;flex-shrink:0;}
.sheet-hd h3{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;color:var(--text-1);}
.sheet-hd p{font-size:13px;color:var(--text-3);margin-top:3px;}
.circle-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0;}
.circle-member{
  display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;
  transition:background 0.18s;
}
.circle-member:active{background:var(--surface);}
.cm-avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--primary);overflow:hidden;flex-shrink:0;}
.cm-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cm-info h4{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--text-1);}
.cm-info p{font-size:12px;color:var(--text-3);margin-top:1px;}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,#F0EFFE 0%,#F9F8FF 50%,#F0EFFE 100%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.skel-thread{display:flex;align-items:center;gap:12px;padding:12px 16px;height:76px;border-bottom:1px solid #F8F8FC;background:var(--white);}
.skel-av{width:52px;height:52px;border-radius:50%;flex-shrink:0;}
.skel-lines{flex:1;display:flex;flex-direction:column;gap:8px;}
.skel-line{height:10px;}

/* ── EMPTY STATE ── */
.empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:56px 32px;text-align:center;flex:1;}
.empty-state.show{display:flex;}
.empty-state svg.main-ico{width:56px;height:56px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.empty-state h3{font-family:'Sora',sans-serif;font-size:18px;font-weight:600;color:var(--text-1);}
.empty-state p{font-size:14px;color:var(--text-3);line-height:1.5;max-width:260px;}
.btn-explore{margin-top:6px;height:44px;padding:0 24px;border-radius:var(--radius-full);border:none;background:var(--gradient);color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 3px 14px rgba(91,91,219,0.28);}

/* ── TOAST ── */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px)+12px);left:50%;transform:translateX(-50%) translateY(-80px);z-index:900;display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:var(--radius-full);font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.12);transition:transform 0.38s cubic-bezier(0.34,1.4,0.64,1);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}
.toast.info{background:var(--surface-2);color:var(--primary);border:1px solid var(--accent);}
.toast svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));background:var(--white);border-top:1px solid #F0F0F5;box-shadow:0 -4px 20px rgba(0,0,0,0.06);display:flex;align-items:flex-start;justify-content:space-around;padding:8px 8px 0;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px 0;position:relative;text-decoration:none;-webkit-tap-highlight-color:transparent;}
.nav-item svg{width:23px;height:23px;stroke:var(--text-4);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.nav-item span{font-size:10px;color:var(--text-4);font-weight:500;transition:color 0.2s;}
.nav-item.active svg{stroke:var(--primary);}
.nav-item.active span{color:var(--primary);font-weight:600;}
.nav-dot{position:absolute;top:2px;width:4px;height:4px;border-radius:50%;background:var(--primary);display:none;}
.nav-item.active .nav-dot{display:block;}
.nav-upload{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 4px 0;text-decoration:none;-webkit-tap-highlight-color:transparent;}
.nav-upload-icon{width:48px;height:48px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(91,91,219,0.35);margin-top:-14px;transition:transform 0.18s;}
.nav-upload-icon:active{transform:scale(0.94);}
.nav-upload-icon svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.nav-upload span{font-size:10px;color:var(--text-4);font-weight:500;}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"><svg id="toastIco" viewBox="0 0 24 24"></svg><span id="toastMsg"></span></div>

<!-- NEW CHAT SHEET -->
<div class="sheet-overlay" id="newChatOverlay" onclick="closeNewChat()"></div>
<div class="bottom-sheet" id="newChatSheet">
  <div class="sheet-drag"></div>
  <div class="sheet-hd">
    <h3>New Message</h3>
    <p>Start a conversation with someone in your Circle</p>
  </div>
  <div class="circle-list" id="circleList">
    <div style="padding:32px;text-align:center;color:var(--text-3);font-size:14px;">Loading your Circle...</div>
  </div>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <span class="header-title">Messages</span>
      <button class="icon-btn" onclick="openNewChat()" aria-label="New message">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search conversations"
             oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- CHAT SCROLL -->
  <div class="chat-scroll" id="chatScroll">

    <!-- Skeletons -->
    <div id="skeletons">
      <div class="skel-thread"><div class="skel skel-av"></div><div class="skel-lines"><div class="skel skel-line" style="width:55%;"></div><div class="skel skel-line" style="width:70%;"></div></div></div>
      <div class="skel-thread"><div class="skel skel-av"></div><div class="skel-lines"><div class="skel skel-line" style="width:45%;"></div><div class="skel skel-line" style="width:65%;"></div></div></div>
      <div class="skel-thread"><div class="skel skel-av"></div><div class="skel-lines"><div class="skel skel-line" style="width:60%;"></div><div class="skel skel-line" style="width:50%;"></div></div></div>
    </div>

    <!-- Direct messages list -->
    <div id="dmList"></div>

    <!-- Group chats -->
    <div id="groupSection" style="display:none;">
      <div class="section-label">Group Chats</div>
      <div id="groupList"></div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <svg class="main-ico" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>No conversations yet</h3>
      <p>Add people to your Circle to start messaging each other.</p>
      <button class="btn-explore" onclick="location.href='search.html'">Explore Students</button>
    </div>

  </div><!-- /chat-scroll -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item" href="feed.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Feed</span>
    </a>
    <a class="nav-item" href="resources.html">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span>Resources</span>
    </a>
    <a class="nav-upload" href="upload-hub.html">
      <div class="nav-upload-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      <span>Upload</span>
    </a>
    <a class="nav-item active" href="chat-list.html">
      <div class="nav-dot"></div>
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </a>
    <a class="nav-item" href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
  </nav>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, query, where,
  orderBy, limit, getDocs, doc, getDoc,
  onSnapshot, updateDoc, deleteDoc,
  serverTimestamp, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyDIAPr5dXMoWsgHNMGON1RG6rhxi1ccQUw",authDomain:"twinkle-7dd5f.firebaseapp.com",databaseURL:"https://twinkle-7dd5f-default-rtdb.firebaseio.com",projectId:"twinkle-7dd5f",storageBucket:"twinkle-7dd5f.firebasestorage.app",messagingSenderId:"584206668657",appId:"1:584206668657:web:3bbb1ae83ecd892b50dcd0"};
const fbApp=initializeApp(cfg);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);
const rtdb=getDatabase(fbApp);

let currentUser=null,userData=null;
let allChats=[];          // full list for search
let typingListeners={};   // chatId → unsubscribe

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='login.html';return;}
  currentUser=user;
  const snap=await getDoc(doc(db,'users',user.uid));
  if(!snap.exists()||!snap.data().academicProfileComplete){window.location.href='profile-form.html';return;}
  userData=snap.data();
  listenChats();
});

/* ── REAL-TIME CHAT LISTENER ── */
function listenChats(){
  const q=query(
    collection(db,'chats'),
    where('participants','array-contains',currentUser.uid),
    orderBy('lastMessageAt','desc'),
    limit(50)
  );

  onSnapshot(q, async snap=>{
    const chats=[];
    snap.forEach(d=>chats.push({id:d.id,...d.data()}));

    // Enrich with partner info
    const enriched=await Promise.all(chats.map(c=>enrichChat(c)));
    allChats=enriched;
    document.getElementById('skeletons').style.display='none';
    renderChats(enriched);

    // Listen to typing status for each chat
    enriched.forEach(c=>listenTyping(c));
  });
}

async function enrichChat(chat){
  if(chat.isGroup) return chat;
  const partnerId=chat.participants.find(p=>p!==currentUser.uid);
  if(!partnerId) return chat;
  try{
    const pSnap=await getDoc(doc(db,'users',partnerId));
    if(pSnap.exists()){
      const p=pSnap.data();
      return{...chat,partnerName:p.displayName||p.userId||'Student',partnerPhoto:p.photoURL||'',partnerClass:p.classGrade||'',partnerBoard:p.board||'',partnerId};
    }
  }catch{}
  return{...chat,partnerId};
}

/* ── TYPING STATUS (RTDB) ── */
function listenTyping(chat){
  const partnerId=chat.partnerId;
  if(!partnerId||typingListeners[chat.id]) return;
  const tRef=ref(rtdb,`typing/${chat.id}/${partnerId}`);
  typingListeners[chat.id]=onValue(tRef,snap=>{
    const isTyping=snap.val()===true;
    const prevEl=document.getElementById(`preview-${chat.id}`);
    if(!prevEl) return;
    if(isTyping){
      prevEl.innerHTML=`<span class="typing-dots"><span></span><span></span><span></span></span>`;
      prevEl.classList.remove('bold');
    }else{
      prevEl.textContent=chat.lastMessage||'Say hello!';
      if(chat.unread>0) prevEl.classList.add('bold');
    }
  });
}

/* ── RENDER ── */
function renderChats(chats){
  const dms=chats.filter(c=>!c.isGroup);
  const groups=chats.filter(c=>c.isGroup);
  const dmList=document.getElementById('dmList');
  const grpList=document.getElementById('groupList');
  const grpSec=document.getElementById('groupSection');
  const empty=document.getElementById('emptyState');

  dmList.innerHTML='';
  grpList.innerHTML='';

  if(!chats.length){empty.classList.add('show');return;}
  empty.classList.remove('show');

  dms.forEach((c,i)=>{
    const el=document.createElement('div');
    el.innerHTML=buildThreadItem(c);
    const wrap=el.firstChild;
    wrap.style.animationDelay=(i*0.04)+'s';
    attachSwipe(wrap,c.id);
    attachLongPress(wrap,c.id,c.partnerName||c.name||'Chat');
    dmList.appendChild(wrap);
  });

  if(groups.length){
    grpSec.style.display='block';
    groups.forEach(c=>{
      const el=document.createElement('div');
      el.innerHTML=buildGroupItem(c);
      const wrap=el.firstChild;
      attachSwipe(wrap,c.id);
      attachLongPress(wrap,c.id,c.name||'Group');
      grpList.appendChild(wrap);
    });
  }else{grpSec.style.display='none';}
}

function buildThreadItem(c){
  const name=c.partnerName||'Student';
  const initial=name[0].toUpperCase();
  const avatar=c.partnerPhoto
    ?`<img src="${esc(c.partnerPhoto)}" alt="" loading="lazy">`
    :initial;
  const unread=c.unread||0;
  const isUnread=unread>0;
  const timeStr=getTimeStr(c.lastMessageAt);
  const preview=esc(c.lastMessage||'Say hello!');
  const meta=[c.partnerClass?'Class '+c.partnerClass:'',c.partnerBoard].filter(Boolean).join(' · ');

  return`
  <div class="thread-wrap" id="wrap-${c.id}" style="animation:cardIn 0.3s ease both;">
    <div class="swipe-delete" id="swipe-${c.id}" onclick="confirmDelete('${c.id}')">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </div>
    <div class="thread-item ${isUnread?'unread':''}" id="thread-${c.id}"
         onclick="openChat('${c.id}','${esc(name)}','${esc(c.partnerPhoto||'')}','${c.partnerId||''}','${esc(meta)}')">
      <div class="t-avatar">
        ${avatar}
        ${c.isOnline?'<div class="online-dot"></div>':''}
      </div>
      <div class="t-content">
        <div class="t-name">${esc(name)}</div>
        <div class="t-preview ${isUnread?'bold':''}" id="preview-${c.id}">${preview}</div>
      </div>
      <div class="t-right">
        <span class="t-time ${isUnread?'unread-time':''}">${timeStr}</span>
        ${isUnread?`<div class="unread-badge">${unread>99?'99+':unread}</div>`:''}
      </div>
    </div>
  </div>`;
}

function buildGroupItem(c){
  const members=c.members||[];
  const name=c.name||'Group Chat';
  const preview=esc(c.lastMessage||'Group created');
  const timeStr=getTimeStr(c.lastMessageAt);
  const unread=c.unread||0;

  const avatarSlots=members.slice(0,3);
  const avHtml=avatarSlots.map((m,i)=>{
    const cls=['group-av-1','group-av-2','group-av-3'][i];
    return`<div class="${cls}">${m.photo?`<img src="${esc(m.photo)}" alt="">`:m.name?.[0]?.toUpperCase()||'G'}</div>`;
  }).join('');

  return`
  <div class="thread-wrap" id="wrap-${c.id}">
    <div class="swipe-delete" id="swipe-${c.id}" onclick="confirmDelete('${c.id}')">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    </div>
    <div class="thread-item ${unread?'unread':''}" id="thread-${c.id}"
         onclick="openChat('${c.id}','${esc(name)}','','','${members.length} members')">
      <div class="group-avatar">${avHtml}</div>
      <div class="t-content">
        <div class="t-name">${esc(name)}</div>
        <div class="t-preview ${unread?'bold':''}" id="preview-${c.id}">${preview}</div>
      </div>
      <div class="t-right">
        <span class="t-time ${unread?'unread-time':''}">${timeStr}</span>
        ${unread?`<div class="unread-badge">${unread>99?'99+':unread}</div>`:''}
      </div>
    </div>
  </div>`;
}

/* ── SEARCH ── */
window.onSearch=function(val){
  document.getElementById('searchClear').classList.toggle('show',val.length>0);
  if(!val.trim()){renderChats(allChats);return;}
  const q=val.toLowerCase();
  const filtered=allChats.filter(c=>{
    const n=(c.partnerName||c.name||'').toLowerCase();
    const m=(c.lastMessage||'').toLowerCase();
    return n.includes(q)||m.includes(q);
  });
  renderChats(filtered);
};
window.clearSearch=function(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  renderChats(allChats);
};

/* ── OPEN CHAT ── */
window.openChat=function(chatId,name,photo,partnerId,meta){
  sessionStorage.setItem('twinkle_chat',JSON.stringify({chatId,name,photo,partnerId,meta}));
  window.location.href='chat-room.html';
};

/* ── DELETE ── */
window.confirmDelete=async function(chatId){
  const wrap=document.getElementById(`wrap-${chatId}`);
  if(wrap){wrap.querySelector('.thread-item').classList.add('deleting');}
  await new Promise(r=>setTimeout(r,300));
  try{await deleteDoc(doc(db,'chats',chatId));showToast('info','Chat deleted.');}
  catch{showToast('info','Could not delete. Try again.');}
};

/* ── NEW CHAT ── */
window.openNewChat=async function(){
  document.getElementById('newChatOverlay').classList.add('show');
  document.getElementById('newChatSheet').classList.add('show');
  document.body.style.overflow='hidden';

  const circleIds=userData?.circleList||[];
  if(!circleIds.length){
    document.getElementById('circleList').innerHTML='<div style="padding:32px;text-align:center;color:var(--text-3);font-size:14px;">Your Circle is empty.<br>Add students to start chatting.</div>';
    return;
  }

  // Fetch circle members
  const members=await Promise.all(circleIds.slice(0,30).map(async uid=>{
    try{const s=await getDoc(doc(db,'users',uid));return{uid,...s.data()};}catch{return null;}
  }));

  const valid=members.filter(Boolean);
  document.getElementById('circleList').innerHTML=valid.map(m=>`
    <div class="circle-member" onclick="startChat('${m.uid}','${esc(m.displayName||'')}','${esc(m.photoURL||'')}')">
      <div class="cm-avatar">${m.photoURL?`<img src="${esc(m.photoURL)}" alt="" loading="lazy">`:((m.displayName||'S')[0].toUpperCase())}</div>
      <div class="cm-info">
        <h4>${esc(m.displayName||m.userId||'Student')}</h4>
        <p>${m.classGrade?'Class '+m.classGrade+' · ':''} ${esc(m.board||'')}</p>
      </div>
    </div>`).join('');
};

window.closeNewChat=function(){
  document.getElementById('newChatOverlay').classList.remove('show');
  document.getElementById('newChatSheet').classList.remove('show');
  document.body.style.overflow='';
};

window.startChat=async function(partnerId,name,photo){
  closeNewChat();
  // Check if chat already exists
  const existing=allChats.find(c=>!c.isGroup&&c.participants?.includes(partnerId));
  if(existing){openChat(existing.id,name,photo,partnerId,'');return;}

  // Create new chat doc
  try{
    const ref=await addDoc(collection(db,'chats'),{
      participants:[currentUser.uid,partnerId],
      isGroup:false,
      createdAt:serverTimestamp(),
      lastMessageAt:serverTimestamp(),
      lastMessage:'',
      unreadCounts:{[currentUser.uid]:0,[partnerId]:0}
    });
    openChat(ref.id,name,photo,partnerId,'');
  }catch{showToast('info','Could not start chat.');}
};

function getTimeStr(ts){
  if(!ts) return '';
  const ms=ts?.toMillis?.()|| (ts?.seconds*1000)||0;
  if(!ms) return '';
  const now=Date.now(),diff=now-ms;
  const d=new Date(ms);
  if(diff<86400000) return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  if(diff<604800000){const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];return days[d.getDay()];}
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function showToast(type,msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIco').innerHTML=type==='success'?'<polyline points="20 6 9 17 4 12"/>':'<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>';
  t.className=`toast ${type}`;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);
}
window.showToast=showToast;
</script>

<script>
function esc(s){if(!s)return'';return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── SWIPE LEFT TO DELETE ── */
function attachSwipe(wrap,chatId){
  const item=wrap.querySelector('.thread-item');
  const swipePnl=wrap.querySelector('.swipe-delete');
  let startX=0,startY=0,isDragging=false,currentX=0;
  const THRESHOLD=60;

  item.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    isDragging=true;
    item.style.transition='none';
  },{passive:true});

  item.addEventListener('touchmove',e=>{
    if(!isDragging) return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dx)<10) return;
    if(dx>0){item.style.transform='translateX(0)';swipePnl.style.transform='translateX(80px)';return;}
    const move=Math.min(Math.abs(dx),80);
    currentX=-move;
    item.style.transform=`translateX(${currentX}px)`;
    swipePnl.style.transform=`translateX(${80-move}px)`;
  },{passive:true});

  item.addEventListener('touchend',()=>{
    isDragging=false;
    item.style.transition='transform 0.22s ease';
    swipePnl.style.transition='transform 0.22s ease';
    if(currentX<-THRESHOLD){
      // Keep revealed
      item.style.transform='translateX(-80px)';
      swipePnl.style.transform='translateX(0)';
    }else{
      item.style.transform='translateX(0)';
      swipePnl.style.transform='translateX(80px)';
    }
    currentX=0;
  },{passive:true});
}

/* ── LONG PRESS CONTEXT MENU ── */
function attachLongPress(wrap,chatId,name){
  const item=wrap.querySelector('.thread-item');
  let pressTimer=null;

  const start=(e)=>{
    pressTimer=setTimeout(()=>showCtxMenu(e,chatId,name),500);
  };
  const cancel=()=>{ clearTimeout(pressTimer); };

  item.addEventListener('touchstart',start,{passive:true});
  item.addEventListener('touchend',cancel,{passive:true});
  item.addEventListener('touchmove',cancel,{passive:true});
}

function showCtxMenu(e,chatId,name){
  // Remove existing
  document.querySelectorAll('.ctx-menu,.ctx-overlay').forEach(el=>el.remove());

  const overlay=document.createElement('div');
  overlay.className='ctx-overlay';
  overlay.onclick=()=>{ document.querySelectorAll('.ctx-menu,.ctx-overlay').forEach(el=>el.remove()); };

  const menu=document.createElement('div');
  menu.className='ctx-menu';

  const touch=e.changedTouches?.[0]||e;
  const x=Math.min(touch.clientX,window.innerWidth-200);
  const y=Math.min(touch.clientY,window.innerHeight-120);
  menu.style.left=x+'px';
  menu.style.top=y+'px';

  menu.innerHTML=`
    <div class="ctx-item" onclick="document.querySelectorAll('.ctx-menu,.ctx-overlay').forEach(el=>el.remove())">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Cancel
    </div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" onclick="document.querySelectorAll('.ctx-menu,.ctx-overlay').forEach(el=>el.remove());confirmDelete('${chatId}')">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      Delete chat
    </div>
    <div class="ctx-item danger" onclick="document.querySelectorAll('.ctx-menu,.ctx-overlay').forEach(el=>el.remove());window.showToast('info','User blocked.')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Block user
    </div>`;

  document.body.appendChild(overlay);
  document.body.appendChild(menu);

  // Vibrate on mobile
  if(navigator.vibrate) navigator.vibrate(40);
}

// Swipe-down new chat sheet
const ncSheet=document.getElementById('newChatSheet');
let ncStartY=0;
ncSheet.addEventListener('touchstart',e=>{ncStartY=e.touches[0].clientY;},{passive:true});
ncSheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ncStartY>60)window.closeNewChat();},{passive:true});

// Keyboard animation
window.addEventListener('resize',()=>{
  document.getElementById('chatScroll').style.paddingBottom=(window.innerHeight<window.screen.height*0.75?'20px':'');
});
</script>
